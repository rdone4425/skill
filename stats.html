<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skill Hub — 统计页</title>
  <meta name="description" content="Skill Hub 统计页，查看 AI Agent Skills 的平台分布、热门仓库和分类统计。">
  <link rel="stylesheet" href="css/style.css?v=3">
</head>
<body>
  <a class="skip-link" href="#main-content">跳到主要内容</a>

  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <a href="index.html" class="brand-name">🔍 Skill Hub</a>
        <span class="brand-badge">STATS</span>
      </div>
      <div class="header-right">
        <button
          type="button"
          class="lang-switcher"
          id="lang-btn"
          aria-label="Toggle language"
          title="Toggle language"
        >
          <span id="lang-current">中文</span>
        </button>
        <nav class="main-nav" aria-label="Primary">
          <a href="index.html" class="github-link">← Home</a>
          <a href="https://github.com/rdone4425/skill" class="github-link" target="_blank" rel="noopener">⭐ GitHub</a>
        </nav>
      </div>
    </div>
  </header>

  <main class="container" id="main-content">
    <section class="hero" aria-labelledby="stats-hero-title">
      <h1 id="stats-hero-title">📊 Skill Hub Stats</h1>
      <p class="hero-sub">平台与功能分类统计</p>
      <p class="hero-desc">数据来自 `agents` 目录的动态聚合结果。</p>
    </section>

    <section class="stats-section" aria-labelledby="stats-summary-title">
      <h2 id="stats-summary-title">总览</h2>
      <div class="stats-summary-grid" id="stats-summary"></div>
    </section>

    <section class="stats-section" id="stats-section" aria-labelledby="stats-distribution-title">
      <h2 id="stats-distribution-title">平台分布</h2>
      <div class="stats-grid">
        <div class="stats-chart-wrap">
          <h3>按 Agent 分布</h3>
          <canvas id="stats-chart" width="400" height="300"></canvas>
        </div>
        <div class="stats-bars-wrap">
          <h3>热门仓库 Top 10</h3>
          <div id="stats-bars"></div>
        </div>
      </div>
    </section>

    <section class="stats-section" aria-labelledby="stats-agent-title">
      <h2 id="stats-agent-title">平台详情</h2>
      <div class="stats-agent-grid" id="stats-agent-grid"></div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <a href="index.html" class="brand-name">🔍 Skill Hub</a>
        <span class="footer-sep">·</span>
        <span data-i18n="footerDesc" class="footer-desc">社区维护 · 每日自动更新</span>
      </div>
      <div class="footer-links">
        <a href="https://github.com/rdone4425/skill" target="_blank" rel="noopener">GitHub</a>
        <span class="footer-sep">·</span>
        <span>© 2025 Skill Hub</span>
      </div>
    </div>
  </footer>

  <script src="js/data.js?v=3"></script>
  <script src="js/i18n.js?v=3"></script>
  <script src="js/state.js?v=3"></script>
  <script src="js/stats-page.js?v=3"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="pageTitle">Skill Hub — AI Agent Skills 导航站 | Codex · Claude · Hermes · OpenCode</title>
  <meta name="description" data-i18n="pageDescription" content="AI Agent Skills 导航站 — 77+ skills from 23 sources. OpenAI Codex 官方精选、Claude Skills、Hermes Agent、OpenCode、OpenClaw 通用技能。搜索、分类、一键安装。">
  <meta name="keywords" content="skill, skills, AI agent, codex, claude code, opencode, hermes agent, openclaw, MCP, agent skills, AI coding, curated skills, awesome list, skill installer, GitHub skills, 统治 skills, 统治 AI agent, 技能导航">
  <meta name="author" content="rdone4425">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://skill.pages.dev/">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" data-i18n="ogTitle" content="Skill Hub — AI Agent Skills 导航站">
  <meta property="og:description" data-i18n="ogDescription" content="77+ AI agent skills from 23 sources — OpenAI Codex, Claude, Hermes, OpenCode, OpenClaw. 官方精选 + 社区清单 + CLI 工具。">
  <meta property="og:url" content="https://skill.pages.dev/">
  <meta property="og:site_name" content="Skill Hub">
  <meta property="og:locale" content="zh_CN">
  <meta property="og:locale:alternate" content="en_US">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" data-i18n="ogTitle" content="Skill Hub — AI Agent Skills 导航站">
  <meta name="twitter:description" data-i18n="ogDescription" content="77+ AI agent skills from 23 sources. 官方精选 + 社区清单.">

  <!-- Structured Data (JSON-LD) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Skill Hub",
    "alternateName": ["Codex Skills Hub", "AI Agent Skills 导航站"],
    "url": "https://skill.pages.dev/",
    "description": "AI Agent Skills 导航站 — 77+ skills from 23 sources (OpenAI Codex, Claude, Hermes, OpenCode, OpenClaw)",
    "keywords": "skill, skills, AI agent, codex, claude code, opencode, hermes agent, openclaw, MCP, agent skills",
    "author": {
      "@type": "Person",
      "name": "rdone4425",
      "url": "https://github.com/rdone4425"
    },
    "potentialAction": {
      "@type": "SearchAction",
      "target": "https://skill.pages.dev/?q={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }
  </script>

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="logo" href="/">
        <span class="logo-icon">🎯</span>
        <div class="logo-copy">
          <h1 class="logo-text" data-i18n="brandName">Skill Hub</h1>
          <p class="logo-subtitle" data-i18n="brandTagline">AI Agent Skills · Codex · Claude · Hermes · OpenCode</p>
        </div>
      </a>
      <div class="header-right">
        <div class="header-stats">
          <div class="stat">
            <span class="stat-value" id="stat-skills">77</span>
            <span class="stat-label" data-i18n="statSkills">Skills</span>
          </div>
          <div class="stat">
            <span class="stat-value" id="stat-sources">23</span>
            <span class="stat-label" data-i18n="statSources">来源</span>
          </div>
          <div class="stat">
            <span class="stat-value" id="stat-stars">561k</span>
            <span class="stat-label" data-i18n="statStars">总 ⭐</span>
          </div>
        </div>
        <div class="lang-switcher" role="group" aria-label="Language">
          <button class="lang-btn" data-lang="zh" title="中文" aria-label="中文">中</button>
          <button class="lang-btn" data-lang="en" title="English" aria-label="English">EN</button>
        </div>
      </div>
    </div>
  </header>

  <main class="container">
    <!-- 搜索 + 分类 Tab -->
    <section class="controls">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input
          id="search"
          type="search"
          class="search-input"
          data-i18n-placeholder="searchPlaceholder"
          placeholder="搜索 skills / 仓库 / 描述…"
          autocomplete="off"
        >
        <button id="search-clear" class="search-clear" data-i18n-title="searchClearTitle" title="清空">×</button>
      </div>

      <nav class="category-tabs" role="tablist" id="category-tabs">
        <!-- 动态生成 by app.js renderCategoryTabs() -->
      </nav>

      <div class="subgroup-tabs" id="subgroup-tabs" hidden></div>

      <!-- 当前分类描述（i18n 切换时更新）-->
      <div class="category-desc" id="category-desc" hidden></div>

      <!-- 排序 + 结果计数 -->
      <div class="results-toolbar">
        <span class="results-count" id="results-count"></span>
        <div class="sort-wrap">
          <label class="sort-label" data-i18n="sortBy">排序</label>
          <select id="sort-select" class="sort-select">
            <option value="stars-desc" data-i18n="sortStarsDesc">⭐ 最多</option>
            <option value="stars-asc" data-i18n="sortStarsAsc">⭐ 最少</option>
            <option value="name-asc" data-i18n="sortNameAsc">A → Z</option>
            <option value="name-desc" data-i18n="sortNameDesc">Z → A</option>
          </select>
        </div>
      </div>
    </section>

    <!-- Skill 卡片网格 -->
    <section class="results" id="results"></section>

    <div class="empty-state" id="empty" hidden>
      <p data-i18n="emptyState">没找到匹配的 skill 😕</p>
    </div>

    <!-- 分页 -->
    <nav class="pagination" id="pagination" hidden>
      <button class="page-btn" id="page-prev" data-i18n="pagePrev">← 上一页</button>
      <span class="page-info" id="page-info"></span>
      <button class="page-btn" id="page-next" data-i18n="pageNext">下一页 →</button>
    </nav>

    <!-- 统计图表 -->
    <section class="stats-section" id="stats-section">
      <h2 data-i18n="statsTitle">📊 数据统计</h2>
      <div class="stats-grid">
        <div class="stats-chart-wrap">
          <h3 data-i18n="statsBySource">按来源分布</h3>
          <canvas id="stats-chart" width="400" height="300"></canvas>
        </div>
        <div class="stats-bars-wrap">
          <h3 data-i18n="statsTopRepos">热门仓库 Top 10</h3>
          <div id="stats-bars"></div>
        </div>
      </div>
    </section>

    <!-- 关于 -->
    <section class="about">
      <h2 data-i18n="aboutTitle">📚 关于</h2>
      <p data-i18n-html="aboutP1"></p>
      <p data-i18n-html="aboutP2"></p>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <span class="footer-logo">🎯</span>
        <div>
          <strong>Skill Hub</strong>
          <p class="footer-desc" data-i18n="footerDesc">AI Agent Skills 导航站</p>
        </div>
      </div>
      <div class="footer-links">
        <a href="https://github.com/rdone4425/skill" target="_blank" rel="noopener">
          <span>⭐</span> <span data-i18n="source">源码</span>
        </a>
        <a href="https://github.com/rdone4425/skill/issues" target="_blank" rel="noopener">
          <span>🐛</span> <span data-i18n="footerIssues">反馈问题</span>
        </a>
        <a href="https://github.com/rdone4425/skill/pulls" target="_blank" rel="noopener">
          <span>🔀</span> <span data-i18n="footerPR">贡献代码</span>
        </a>
      </div>
      <div class="footer-meta">
        <span data-i18n="license">MIT License</span> ·
        <span data-i18n="dataUpdated">数据最后更新</span> <span id="last-updated">2026-06-04</span>
      </div>
    </div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/app.js"></script>
</body>
</html>

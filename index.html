<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO Meta Tags -->
  <title>Skill Hub — AI Agent Skills 导航站</title>
  <meta name="description" content="Skill Hub — 汇集 OpenAI Codex、Claude Code、Hermes Agent、OpenCode 等主流 AI Agent 平台的 Skills，按 Agent 分类，支持安装、收藏、分页浏览。输入关键词即可跨平台搜索，快速找到你需要的 skill。">
  <meta name="keywords" content="AI Agent Skills, OpenAI Codex, Claude Code, Hermes Agent, OpenCode, OpenClaw, Skill Hub, 导航站">
  <meta name="author" content="rdone4425">
  <meta name="robots" content="index, follow">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Skill Hub — AI Agent Skills 导航站">
  <meta property="og:description" content="汇集主流 AI Agent 平台的 Skills，一站式搜索、浏览、安装。按 Agent 分类，快速找寻。">
  <meta property="og:url" content="https://skill.442595.xyz">
  <meta property="og:image" content="https://skill.442595.xyz/og-image.png">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Skill Hub — AI Agent Skills 导航站">
  <meta name="twitter:description" content="汇集主流 AI Agent 平台的 Skills，一站式搜索、浏览、安装。按 Agent 分类，快速找寻。">
  <meta name="twitter:image" content="https://skill.442595.xyz/og-image.png">

  <!-- Canonical -->
  <link rel="canonical" href="https://skill.442595.xyz">

  <!-- JSON-LD -->
  <script id="ld-json" type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Skill Hub — AI Agent Skills 导航站",
    "description": "汇集主流 AI Agent 平台的 Skills，一站式搜索、浏览、安装。",
    "url": "https://skill.442595.xyz",
    "author": {
      "@type": "Person",
      "name": "rdone4425"
    }
  }
  </script>

  <link rel="stylesheet" href="css/style.css?v=2">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <a href="/" class="brand-name" data-i18n="heroTitle">🔍 Skill Hub</a>
        <span class="brand-badge">BETA</span>
      </div>
      <div class="header-right">
        <div class="stats" id="stats"></div>
        <div class="lang-switch" id="lang-btn" onclick="setLang(getLang()==='zh'?'en':'zh')">
          <span id="lang-current">中文</span>
        </div>
        <a href="https://github.com/rdone4425/skill" class="github-link" target="_blank" rel="noopener">⭐ GitHub</a>
      </div>
    </div>
  </header>

  <section class="hero">
    <h1 data-i18n="heroTitle">🔍 Skill Hub</h1>
    <p class="hero-sub" data-i18n="heroSub">AI Agent Skills 导航站</p>
    <p class="hero-desc" data-i18n="heroDesc">汇集主流 AI Agent 平台的 Skills，一站式搜索、浏览、安装。</p>
  </section>

  <main class="container">
    <!-- 搜索 + 分类 Tab -->
    <section class="controls">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input
          id="search"
          type="search"
          class="search-input"
          data-i18n-placeholder="searchPlaceholder"
          placeholder="搜索 skills / 仓库 / 描述…"
          autocomplete="off"
        >
        <button id="search-clear" class="search-clear" data-i18n-title="searchClearTitle" title="清空">×</button>
      </div>

      <nav class="category-tabs" role="tablist" id="category-tabs">
        <!-- 动态生成 by app.js renderCategoryTabs() -->
      </nav>

      <div class="subgroup-tabs" id="subgroup-tabs" hidden></div>

      <!-- 当前分类描述（i18n 切换时更新）-->
      <div class="category-desc" id="category-desc" hidden></div>

      <!-- 视图切换 + 排序 + 分组 + 结果计数 -->
      <div class="results-toolbar">
        <span class="results-count" id="results-count"></span>
        <div class="toolbar-controls">
          <div class="sort-wrap">
            <label class="sort-label" data-i18n="sortBy">排序</label>
            <select id="sort-select" class="sort-select" data-i18n-options="stars-desc:sortStarsDesc,stars-asc:sortStarsAsc,name-asc:sortNameAsc,name-desc:sortNameDesc">
              <option value="stars-desc">⭐ 最多</option>
              <option value="stars-asc">⭐ 最少</option>
              <option value="name-asc">A → Z</option>
              <option value="name-desc">Z → A</option>
            </select>
          </div>
          <div class="group-wrap">
            <label class="sort-label" data-i18n="groupBy">分组</label>
            <select id="group-select" class="sort-select" data-i18n-options="agent:groupAgent,none:groupNone">
              <option value="agent">按 Agent</option>
              <option value="none">不分组</option>
            </select>
          </div>
          <button class="view-toggle" id="view-toggle" title="切换视图">📋</button>
        </div>
      </div>
    </section>

    <!-- Skill 卡片网格 / 分组视图 -->
    <section class="results" id="results"></section>

    <div class="empty-state" id="empty" hidden>
      <p data-i18n="emptyState">没找到匹配的 skill 😕</p>
    </div>

    <!-- 分页 -->
    <nav class="pagination" id="pagination" hidden>
      <button class="page-btn" id="page-prev" data-i18n="pagePrev">← 上一页</button>
      <span class="page-info" id="page-info"></span>
      <button class="page-btn" id="page-next" data-i18n="pageNext">下一页 →</button>
    </nav>

    <!-- 统计图表 -->
    <section class="stats-section" id="stats-section">
      <h2 data-i18n="statsTitle">📊 数据统计</h2>
      <div class="stats-grid">
        <div class="stats-chart-wrap">
          <h3 data-i18n="statsBySource">按 Agent 来源分布</h3>
          <canvas id="stats-chart" width="400" height="300"></canvas>
        </div>
        <div class="stats-bars-wrap">
          <h3 data-i18n="statsTopRepos">热门仓库 Top 10</h3>
          <div id="stats-bars"></div>
        </div>
      </div>
    </section>

    <!-- 关于 -->
    <section class="about">
      <h2 data-i18n="aboutTitle">📚 关于</h2>
      <p data-i18n-html="aboutP1"></p>
      <p data-i18n-html="aboutP2"></p>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <a href="/" class="brand-name">🔍 Skill Hub</a>
        <span class="footer-sep">·</span>
        <span data-i18n="footerDesc" class="footer-desc">社区维护 · 每日自动更新</span>
      </div>
      <div class="footer-links">
        <a href="https://github.com/rdone4425/skill" target="_blank" rel="noopener">GitHub</a>
        <span class="footer-sep">·</span>
        <span>© 2025 Skill Hub</span>
      </div>
    </div>
  </footer>

  <script src="js/data.js?v=2"></script>
  <script src="js/i18n.js?v=2"></script>
  <script src="js/app.js?v=2"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO Meta Tags -->
  <title>Skill Hub — AI Agent Skills 导航站</title>
  <meta name="description" content="Skill Hub — 汇集 OpenAI Codex、Claude Code、Hermes Agent、OpenCode 等主流 AI Agent 平台的 Skills，按 Agent 分类，支持安装、收藏、分页浏览。输入关键词即可跨平台搜索，快速找到你需要的 skill。">
  <meta name="keywords" content="AI Agent Skills, OpenAI Codex, Claude Code, Hermes Agent, OpenCode, OpenClaw, Skill Hub, 导航站">
  <meta name="author" content="rdone4425">
  <meta name="robots" content="index, follow">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Skill Hub — AI Agent Skills 导航站">
  <meta property="og:description" content="汇集主流 AI Agent 平台的 Skills，一站式搜索、浏览、安装。按 Agent 分类，快速找寻。">
  <meta property="og:url" content="">
  <meta property="og:image" content="/og-image.png">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Skill Hub — AI Agent Skills 导航站">
  <meta name="twitter:description" content="汇集主流 AI Agent 平台的 Skills，一站式搜索、浏览、安装。按 Agent 分类，快速找寻。">
  <meta name="twitter:image" content="/og-image.png">

  <!-- Canonical -->
  <link rel="canonical" href="/">
  <link rel="icon" type="image/x-icon" href="assets/icons/favicon.ico?v=12">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32x32.png?v=12">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/icons/favicon-16x16.png?v=12">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/apple-touch-icon.png?v=12">

  <!-- JSON-LD -->
  <script id="ld-json" type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Skill Hub — AI Agent Skills 导航站",
    "description": "汇集主流 AI Agent 平台的 Skills，一站式搜索、浏览、安装。",
    "url": "/",
    "author": {
      "@type": "Person",
      "name": "rdone4425"
    }
  }
  </script>
  <script>
    (function () {
      var origin = window.location.origin;
      var path = window.location.pathname;
      var canonicalUrl = origin + path;
      var canonical = document.querySelector('link[rel="canonical"]');
      if (canonical) canonical.setAttribute('href', canonicalUrl);
      var ogUrl = document.querySelector('meta[property="og:url"]');
      if (ogUrl) ogUrl.setAttribute('content', canonicalUrl);
      document.querySelectorAll('meta[property="og:image"], meta[name="twitter:image"]').forEach(function (meta) {
        var content = meta.getAttribute('content') || '';
        if (content.charAt(0) === '/') meta.setAttribute('content', origin + content);
      });
      var ldJson = document.getElementById('ld-json');
      if (ldJson) {
        try {
          var data = JSON.parse(ldJson.textContent);
          data.url = canonicalUrl;
          ldJson.textContent = JSON.stringify(data);
        } catch (e) {}
      }
    })();
  </script>

  <link rel="stylesheet" href="css/style.css?v=13">
</head>
<body>
  <a class="skip-link" href="#main-content">跳到主要内容</a>

  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <a href="index.html" class="brand-name brand-lockup" aria-label="Skill Hub home">
          <img class="brand-logo" src="assets/icons/favicon-32x32.png?v=12" alt="Skill Hub logo">
          <span data-i18n="heroTitle">Skill Hub</span>
        </a>
        <span class="brand-badge">BETA</span>
      </div>
      <div class="header-right">
        <div class="stats" id="stats" aria-live="polite"></div>
        <button
          type="button"
          class="lang-switcher"
          id="lang-btn"
          aria-label="Toggle language"
          title="Toggle language"
        >
          <span id="lang-current">中文</span>
        </button>
        <nav class="main-nav" aria-label="Primary">
          <a href="stats.html" class="github-link">📊 Stats</a>
          <a href="https://github.com/rdone4425/skill" class="github-link" target="_blank" rel="noopener">⭐ GitHub</a>
        </nav>
      </div>
    </div>
  </header>

  <main class="container" id="main-content">
    <section class="hero" aria-labelledby="hero-title">
      <div class="hero-content">
        <div class="hero-brand">
          <img class="hero-logo" src="assets/icons/favicon.png?v=12" alt="Skill Hub logo">
          <div class="hero-copy">
            <h1 id="hero-title" class="hero-title">
              <span data-i18n="heroTitle">Skill Hub</span>
            </h1>
            <p class="hero-sub" data-i18n="heroSub">AI Agent Skills 导航站</p>
          </div>
        </div>
        <p class="hero-desc" data-i18n="heroDesc">汇集主流 AI Agent 平台的 Skills，一站式搜索、浏览、安装。</p>
      </div>
    </section>

    <div class="content-shell">
    <section class="controls" aria-labelledby="controls-title">
      <h2 class="visually-hidden" id="controls-title">筛选与搜索</h2>
      <div class="search-wrap">
        <label class="visually-hidden" for="search">搜索 skills</label>
        <span class="search-icon" aria-hidden="true">⌕</span>
        <input
          id="search"
          type="search"
          class="search-input"
          data-i18n-placeholder="searchPlaceholder"
          placeholder="搜索 skills / 仓库 / 描述…"
          autocomplete="off"
        >
        <button id="search-clear" type="button" class="search-clear" data-i18n-title="searchClearTitle" title="清空" aria-label="清空搜索">×</button>
      </div>

      <nav class="category-tabs" role="tablist" id="category-tabs" aria-label="Agent platforms">
        <!-- 动态生成 by render.js -->
      </nav>

      <div class="subgroup-tabs" id="subgroup-tabs" hidden></div>
      <div class="category-desc" id="category-desc" hidden></div>

      <div class="results-toolbar">
        <span class="results-count" id="results-count" aria-live="polite"></span>
        <div class="toolbar-controls">
          <div class="sort-wrap">
            <label class="sort-label" for="sort-select" data-i18n="sortBy">排序</label>
            <select id="sort-select" class="sort-select" data-i18n-options="stars-desc:sortStarsDesc,stars-asc:sortStarsAsc,name-asc:sortNameAsc,name-desc:sortNameDesc">
              <option value="stars-desc">⭐ 最多</option>
              <option value="stars-asc">⭐ 最少</option>
              <option value="name-asc">A → Z</option>
              <option value="name-desc">Z → A</option>
            </select>
          </div>
          <button class="view-toggle" id="view-toggle" type="button" title="切换视图" aria-label="切换视图">📋</button>
        </div>
      </div>
    </section>

    <div class="content-main">
    <section class="results-section" aria-labelledby="results-title">
      <h2 class="visually-hidden" id="results-title">Skill Results</h2>
      <section class="results" id="results" aria-live="polite"></section>
      <div class="empty-state" id="empty" hidden>
        <p data-i18n="emptyState">没找到匹配的 skill 😕</p>
      </div>
    </section>

    <nav class="pagination" id="pagination" hidden aria-label="Pagination">
      <button class="page-btn" id="page-prev" type="button" data-i18n="pagePrev">← 上一页</button>
      <span class="page-info" id="page-info"></span>
      <button class="page-btn" id="page-next" type="button" data-i18n="pageNext">下一页 →</button>
    </nav>

    </div>
    </div>

    <section class="about" aria-labelledby="about-title">
      <h2 id="about-title" data-i18n="aboutTitle">📚 关于</h2>
      <p data-i18n-html="aboutP1"></p>
      <p data-i18n-html="aboutP2"></p>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <a href="/" class="brand-name brand-lockup">
          <img class="brand-logo" src="assets/icons/favicon-32x32.png?v=12" alt="Skill Hub logo">
          <span>Skill Hub</span>
        </a>
        <span class="footer-sep">·</span>
        <span data-i18n="footerDesc" class="footer-desc">社区维护 · 每日自动更新</span>
      </div>
      <div class="footer-links">
        <a href="https://github.com/rdone4425/skill" target="_blank" rel="noopener">GitHub</a>
        <span class="footer-sep">·</span>
        <span>© 2025 Skill Hub</span>
      </div>
    </div>
  </footer>

  <script src="js/data.js?v=14"></script>
  <script src="js/i18n.js?v=14"></script>
  <script src="js/state.js?v=14"></script>
  <script src="js/render.js?v=14"></script>
  <script src="js/events.js?v=14"></script>
  <script src="js/app.js?v=14"></script>
</body>
</html>

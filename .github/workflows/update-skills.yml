name: Update Skill Hub Data

# 只负责：从 config/repos.json 读取配置，更新已有仓库的 stars 和描述
# 新仓库发现由 Hermes 定时任务负责（每 3 小时搜索 GitHub）
#
# 触发方式：
#   1. 定时：每天 UTC 00:00（北京时间 8:00）
#   2. Push: config/repos.json 变化时自动触发
#   3. 手动：Actions → Run workflow
on:
  schedule:
    - cron: "0 0 * * *"    # 每天运行
  push:
    paths:
      - config/repos.json
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (只抓取不提交)"
        required: false
        type: boolean
        default: false

# 防止并行运行
concurrency:
  group: update-skill-hub-data
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    name: 📊 Update skills data
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ─── 1. 检出代码 ───
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      # ─── 2. Python 环境 ───
      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ─── 3. 读取配置，更新数据 ───
      - name: 🚀 Fetch skills data
        id: fetch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "::group::📊 Fetching latest stars & descriptions..."
          python scripts/fetch-skills.py 2>&1
          echo "::endgroup::"

          echo "---"
          echo "📊 data.js:"
          wc -l js/data.js

      # ─── 4. 检测变更 ───
      - name: 🔎 Detect changes
        id: check
        run: |
          echo "## 📊 Skill Hub Update" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if git diff --quiet js/data.js; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No changes — data is up to date"
            echo "✅ **No changes** — already up to date" >> $GITHUB_STEP_SUMMARY
          else
            echo "changed=true" >> $GITHUB_OUTPUT

            TOTAL=$(grep -c '"name":' js/data.js || echo "?")
            STARS=$(grep -oE '"stars": [0-9]+' js/data.js | awk '{s+=$2} END {print s}')
            SOURCES=$(grep -oE '"repo":' js/data.js | wc -l || echo "?")
            REPOS=$(python3 -c "import json; print(len(json.load(open('config/repos.json')).get('repos', {})))" 2>/dev/null || echo "?")
            DATE=$(date -u +"%Y-%m-%d %H:%M UTC")

            echo "total_skills=${TOTAL}" >> $GITHUB_OUTPUT
            echo "total_stars=${STARS}" >> $GITHUB_OUTPUT

            echo "✅ **Changes detected!**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Skills | ${TOTAL} |" >> $GITHUB_STEP_SUMMARY
            echo "| Sources | ${SOURCES} |" >> $GITHUB_STEP_SUMMARY
            echo "| Repos tracked | ${REPOS} |" >> $GITHUB_STEP_SUMMARY
            echo "| Total Stars | ${STARS} |" >> $GITHUB_STEP_SUMMARY
            echo "| Updated | ${DATE} |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            git diff --stat js/data.js >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      # ─── 5. 提交并推送 ───
      - name: 📝 Commit and push
        if: steps.check.outputs.changed == 'true' && inputs.dry_run != true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add js/data.js

          TOTAL="${{ steps.check.outputs.total_skills }}"
          STARS="${{ steps.check.outputs.total_stars }}"
          DATE=$(date -u +"%Y-%m-%d %H:%M UTC")

          git commit -m "chore: update skills data

          - Skills: ${TOTAL}
          - Stars:  ${STARS}
          - Date:   ${DATE}

          [skip ci]"

          echo "📤 Pushing to main..."
          git push

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🚀 **Pushed to main** at ${DATE}" >> $GITHUB_STEP_SUMMARY

      # ─── 6. Dry run ───
      - name: 🧪 Dry run
        if: steps.check.outputs.changed == 'true' && inputs.dry_run == true
        run: |
          echo "::notice::🧪 DRY RUN — changes not committed"
          git diff --stat js/data.js

      # ─── 7. 无变更 ───
      - name: ✅ No changes
        if: steps.check.outputs.changed == 'false'
        run: |
          echo "Data is up to date. Next run: tomorrow 00:00 UTC"

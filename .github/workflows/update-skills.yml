name: Update Codex Skills

# 每周一 UTC 00:00 跑一次（北京时间 8:00）
# 也可以手动触发：Actions 标签 → Update Codex Skills → Run workflow
on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (don't commit or create PR)"
        required: false
        default: "false"

permissions:
  contents: write   # 写代码 / 创建分支
  pull-requests: write  # 创建 PR

jobs:
  update:
    name: Fetch and update skills data
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 🚀 Run fetch-skills.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/fetch-skills.py
          echo "---"
          echo "📊 Final data.js size:"
          wc -l js/data.js

      - name: 🔍 Check for changes
        id: check
        run: |
          if git diff --quiet js/data.js; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "ℹ️  No changes detected"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "✅ Changes detected:"
            git diff --stat js/data.js
          fi

      - name: 🤖 Create Pull Request
        if: steps.check.outputs.changed == 'true' && github.event.inputs.dry_run != 'true'
        uses: peter-evans/create-pull-request-action@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: auto-update Codex skills data"
          title: "🤖 Auto-update Codex skills data"
          body: |
            ## Auto-generated by GitHub Actions

            Updates star counts, descriptions, and discovers new Codex skills from:
            - `openai/skills` (.curated)
            - 17 known community / tools / general agent skill repos

            ### Changes
            See the diff for full details.
          branch: chore/auto-update-skills
          delete-branch: true
          add-paths: |
            js/data.js
            scripts/fetch-skills.py

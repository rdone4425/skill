name: Discover Skill Repos

on:
  schedule:
    - cron: "0 */6 * * *"
  push:
    paths:
      - scripts/discover-skills.py
      - scripts/discover-new-skills.sh
      - scripts/lib/common.sh
      - config/repos.json
      - .github/workflows/discover-skill-repos.yml
  workflow_dispatch:

concurrency:
  group: discover-skill-repos
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  discover:
    name: 🔍 Discover new repos
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 🔎 Discover repos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/discover-skills.py

      - name: 📝 Commit repo config changes
        run: |
          if git diff --quiet config/repos.json; then
            echo "No new repos discovered."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add config/repos.json

          DATE=$(date -u +"%Y-%m-%d %H:%M UTC")

          git commit -m "chore: discover new skill repos

          - Updated: ${DATE}

          [skip ci]"

          git push

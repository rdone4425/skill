name: Update Generated Data

on:
  schedule:
    - cron: "0 0 * * *"
  push:
    paths:
      - config/repos.json
      - scripts/fetch-skills.py
      - scripts/export-agent-function-data.js
      - scripts/run-data-pipeline.sh
      - scripts/lib/common.sh
      - .github/workflows/update-generated-data.yml
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (只生成不提交)"
        required: false
        type: boolean
        default: false

concurrency:
  group: update-generated-data
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    name: 📊 Update generated assets
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 🟢 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 🚀 Run data pipeline
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/run-data-pipeline.sh
          scripts/run-data-pipeline.sh

      - name: 🔎 Detect changes
        id: check
        run: |
          echo "## 📊 Generated Data Update" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if git diff --quiet js/data.js agents; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "✅ **No changes** — generated data is up to date" >> $GITHUB_STEP_SUMMARY
          else
            echo "changed=true" >> $GITHUB_OUTPUT

            TOTAL=$(grep -c '"name":' js/data.js || echo "?")
            STARS=$(grep -oE '"stars": [0-9]+' js/data.js | awk '{s+=$2} END {print s}')
            AGENT_FILES=$(find agents -type f | wc -l || echo "?")
            DATE=$(date -u +"%Y-%m-%d %H:%M UTC")

            echo "total_skills=${TOTAL}" >> $GITHUB_OUTPUT
            echo "total_stars=${STARS}" >> $GITHUB_OUTPUT

            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Skills | ${TOTAL} |" >> $GITHUB_STEP_SUMMARY
            echo "| Agent files | ${AGENT_FILES} |" >> $GITHUB_STEP_SUMMARY
            echo "| Total Stars | ${STARS} |" >> $GITHUB_STEP_SUMMARY
            echo "| Updated | ${DATE} |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            git diff --stat js/data.js agents >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: 📝 Commit and push
        if: steps.check.outputs.changed == 'true' && inputs.dry_run != true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add js/data.js agents

          TOTAL="${{ steps.check.outputs.total_skills }}"
          STARS="${{ steps.check.outputs.total_stars }}"
          DATE=$(date -u +"%Y-%m-%d %H:%M UTC")

          git commit -m "chore: update generated skill data

          - Skills: ${TOTAL}
          - Stars:  ${STARS}
          - Date:   ${DATE}

          [skip ci]"

          git push

      - name: 🧪 Dry run
        if: steps.check.outputs.changed == 'true' && inputs.dry_run == true
        run: |
          echo "::notice::🧪 DRY RUN — generated data not committed"
          git diff --stat js/data.js agents
